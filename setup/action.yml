name: "RAPS Setup"
description: "Install RAPS CLI and configure APS authentication"
branding:
  icon: "terminal"
  color: "orange"

inputs:
  version:
    description: "RAPS version to install (e.g., 4.15.0 or latest)"
    required: false
    default: "latest"
  client-id:
    description: "APS Client ID"
    required: true
  client-secret:
    description: "APS Client Secret"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install RAPS
      shell: bash
      env:
        RAPS_VERSION: ${{ inputs.version }}
        RAPS_NO_MODIFY_PATH: "1"
      run: |
        curl -fsSL https://raw.githubusercontent.com/dmytro-yemelianov/raps/main/install.sh | bash
        echo "${HOME}/.raps/bin" >> "$GITHUB_PATH"

    - name: Configure authentication
      shell: bash
      env:
        APS_CLIENT_ID: ${{ inputs.client-id }}
        APS_CLIENT_SECRET: ${{ inputs.client-secret }}
      run: |
        raps auth test --output json
        echo "APS authentication verified"
